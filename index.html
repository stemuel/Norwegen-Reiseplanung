<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interaktiver Reiseplan für die Camper-Tour Hamburg – Norwegen – Marktoberdorf, 11. August bis 11. September 2026.">
  <title>🇳🇴 Norwegen 2026 – Camper-Reiseplan</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Mobile header (only visible on small screens) -->
  <header class="mobile-header">
    <button class="hamburger" id="menuBtn" aria-label="Navigation öffnen">☰</button>
    <span class="mobile-header-title">🇳🇴 Norwegen 2026</span>
  </header>

  <div class="app">

    <!-- Sidebar navigation (populated by app.js) -->
    <nav class="sidebar" id="sidebar" aria-label="Stopp-Navigation"></nav>

    <!-- Backdrop for mobile sidebar -->
    <div class="overlay" id="overlay" aria-hidden="true"></div>

    <!-- Main content -->
    <main class="main" id="main">

      <section class="hero">
        <div class="hero-badge">🚐 Camper-Tour 2026</div>
        <h1>Hamburg → Norwegen<br>→ Marktoberdorf</h1>
        <p class="hero-subtitle">11. August – 11. September 2026</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-number">31</div>
            <div class="hero-stat-label">Tage</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-number">14</div>
            <div class="hero-stat-label">Stopps</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-number">~4.000</div>
            <div class="hero-stat-label">km Route</div>
          </div>
        </div>
      </section>

      <section class="timeline-section">
        <div class="section-label">Alle Stopps in chronologischer Reihenfolge</div>
        <!-- Timeline items are inserted here by app.js -->
        <div class="timeline" id="timeline"></div>
      </section>

      <section class="timeline-section" style="margin-top: 0; padding-top: 0;">
        <div class="section-label" style="margin-top: 24px;">Infos &amp; Planung</div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; padding: 0 0 24px;">
          <a href="pages/praktisches.html" class="stop-link" style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;">
            📋 Praktische Infos
          </a>
          <a href="pages/ki-prompts.html" class="stop-link" style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem;">
            🤖 KI-Prompt-Liste
          </a>
        </div>
      </section>

    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
